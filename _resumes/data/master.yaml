# Master resume content library.
#
# Single source of truth for every resume variant (_resumes/variants/*.yaml)
# and the website timeline (src/_data/resume.js). Text is canonical prose:
#   **bold**  *italic*  [text](url)   plus Unicode – — ~ × λ “ ” and literal
#   % & # $ _ characters; the generator escapes per target (LaTeX / HTML).
# Raw backslashes are a validation error — use a per-bullet tex:/html:
# override for the rare construct the markup can't express.
#
# Bullets marked `alt: true` are shared condensed rewordings: excluded from
# `bullets: all`, selectable by id from variant specs and the website.
# Dates are quoted "YYYY-MM" or the word `present`. Bullets always use `>-`.

